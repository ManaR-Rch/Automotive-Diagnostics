<div class="flex min-h-screen bg-dark-900">
  <app-sidebar></app-sidebar>
  <main class="flex-1 overflow-auto p-6 lg:p-8">
    <h1 class="text-2xl font-bold text-white mb-6">Administration • Rendez-vous</h1>

    <div *ngIf="error$ | async as err" class="mb-4 p-3 text-red-400 bg-red-900/30 border border-red-800 rounded">{{ err }}</div>

    <div class="card overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-left text-gray-500 border-b border-dark-600">
            <th class="py-3">ID</th><th>Date</th><th>User</th><th>Véhicule</th><th>Service</th><th>Statut</th><th class="text-right">Action</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-dark-600">
          <tr *ngFor="let a of appointments$ | async" class="table-row">
            <td class="py-3 text-white">#{{ a.id }}</td>
            <td class="text-gray-300">{{ a.dateRdv | date:'dd/MM/yyyy HH:mm' }}</td>
            <td class="text-gray-400">{{ a.userId }}</td>
            <td class="text-gray-400">{{ a.vehiculeId }}</td>
            <td class="text-gray-400">{{ a.serviceId }}</td>
            <td class="text-gray-300">{{ a.statut }}</td>
            <td class="text-right">
              <select [value]="a.statut" (change)="updateStatus(a.id!, $any($event.target).value)" class="form-input w-40 inline-block">
                <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
              </select>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div class="min-h-screen bg-dark-900 flex items-center justify-center px-4 py-12">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/3 right-1/4 w-72 h-72 bg-primary-700 rounded-full blur-3xl opacity-5"></div>
  </div>

  <div class="relative z-10 w-full max-w-lg">
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-flex items-center gap-3 group">
        <div class="w-12 h-12 bg-primary-600 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <span class="text-white font-black text-2xl">MOTO<span class="text-primary-500">DIAG</span></span>
      </a>
      <h1 class="text-2xl font-bold text-white mt-6">Créer un Compte</h1>
      <p class="text-gray-500 text-sm mt-1">Rejoignez des milliers de clients satisfaits</p>
    </div>

    <div class="bg-dark-800 border border-dark-600 rounded-2xl p-8 shadow-2xl">
      <!-- Success -->
      <div *ngIf="registered$ | async" class="bg-green-900/40 border border-green-700 rounded-xl p-4 mb-6 text-green-400 text-sm flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Compte créé avec succès! Redirection vers la connexion...
      </div>

      <!-- Error -->
      <div *ngIf="error$ | async as err" class="bg-red-900/40 border border-red-700 rounded-xl p-4 mb-6 flex items-center justify-between">
        <p class="text-red-400 text-sm">{{ err }}</p>
        <button (click)="clearError()" class="text-red-600 hover:text-red-400">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4" *ngIf="!(registered$ | async)">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="form-label">Nom <span class="text-red-500">*</span></label>
            <input formControlName="nom" type="text" class="form-input" placeholder="Dupont"
              [class.border-red-600]="form.get('nom')?.invalid && form.get('nom')?.touched">
            <p *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched" class="text-red-400 text-xs mt-1">Requis</p>
          </div>
          <div>
            <label class="form-label">Prénom <span class="text-red-500">*</span></label>
            <input formControlName="prenom" type="text" class="form-input" placeholder="Jean"
              [class.border-red-600]="form.get('prenom')?.invalid && form.get('prenom')?.touched">
            <p *ngIf="form.get('prenom')?.invalid && form.get('prenom')?.touched" class="text-red-400 text-xs mt-1">Requis</p>
          </div>
        </div>

        <div>
          <label class="form-label">Email <span class="text-red-500">*</span></label>
          <div class="relative">
            <input formControlName="email" type="email" class="form-input pl-10" placeholder="votre@email.com"
              [class.border-red-600]="form.get('email')?.invalid && form.get('email')?.touched">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </div>
          <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-red-400 text-xs mt-1">Email invalide</p>
        </div>

        <div>
          <label class="form-label">Téléphone <span class="text-red-500">*</span></label>
          <div class="relative">
            <input formControlName="telephone" type="tel" class="form-input pl-10" placeholder="+212 6XX XXX XXX"
              [class.border-red-600]="form.get('telephone')?.invalid && form.get('telephone')?.touched">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          </div>
          <p *ngIf="form.get('telephone')?.invalid && form.get('telephone')?.touched" class="text-red-400 text-xs mt-1">Numéro de téléphone obligatoire (8–15 chiffres)</p>
        </div>

        <div>
          <label class="form-label">Mot de Passe <span class="text-red-500">*</span></label>
          <div class="relative">
            <input formControlName="motDePasse" [type]="showPassword ? 'text' : 'password'" class="form-input pl-10 pr-10"
              placeholder="Minimum 6 caractères"
              [class.border-red-600]="form.get('motDePasse')?.invalid && form.get('motDePasse')?.touched">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <button type="button" (click)="showPassword=!showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
          <p *ngIf="form.get('motDePasse')?.invalid && form.get('motDePasse')?.touched" class="text-red-400 text-xs mt-1">Minimum 6 caractères</p>
        </div>

        <button type="submit" class="btn-primary w-full flex items-center justify-center gap-2 mt-2"
          [disabled]="loading$ | async">
          <svg *ngIf="loading$ | async" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          {{ (loading$ | async) ? 'Inscription...' : 'Créer Mon Compte' }}
        </button>
      </form>

      <div class="mt-6 text-center" *ngIf="!(registered$ | async)">
        <p class="text-gray-500 text-sm">
          Déjà un compte?
          <a routerLink="/auth/login" class="text-primary-400 hover:text-primary-300 font-medium ml-1">Se connecter</a>
        </p>
      </div>
    </div>
  </div>
</div>

<div class="min-h-screen bg-dark-900 flex items-center justify-center px-4 py-12">
  <!-- Background -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/3 left-1/4 w-72 h-72 bg-primary-700 rounded-full blur-3xl opacity-5"></div>
    <div class="absolute bottom-1/3 right-1/4 w-56 h-56 bg-primary-600 rounded-full blur-3xl opacity-5"></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-flex items-center gap-3 group">
        <div class="w-12 h-12 bg-primary-600 rounded-xl flex items-center justify-center group-hover:bg-primary-500 transition-colors">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <span class="text-white font-black text-2xl">MOTO<span class="text-primary-500">DIAG</span></span>
      </a>
      <h1 class="text-2xl font-bold text-white mt-6">Bon Retour!</h1>
      <p class="text-gray-500 text-sm mt-1">Connectez-vous à votre espace personnel</p>
    </div>

    <!-- Card -->
    <div class="bg-dark-800 border border-dark-600 rounded-2xl p-8 shadow-2xl">
      <!-- Error -->
      <div *ngIf="error$ | async as err" class="bg-red-900/40 border border-red-700 rounded-xl p-4 mb-6 flex items-center justify-between">
        <div class="flex items-center gap-2 text-red-400 text-sm">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          {{ err }}
        </div>
        <button (click)="clearError()" class="text-red-600 hover:text-red-400">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <!-- Email -->
        <div>
          <label class="form-label">Adresse Email</label>
          <div class="relative">
            <input formControlName="email" type="email" class="form-input pl-10"
              placeholder="votre@email.com"
              [class.border-red-600]="form.get('email')?.invalid && form.get('email')?.touched">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          </div>
          <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-red-400 text-xs mt-1">Email invalide</p>
        </div>

        <!-- Password -->
        <div>
          <label class="form-label">Mot de Passe</label>
          <div class="relative">
            <input formControlName="motDePasse" [type]="showPassword ? 'text' : 'password'" class="form-input pl-10 pr-10"
              placeholder="••••••••"
              [class.border-red-600]="form.get('motDePasse')?.invalid && form.get('motDePasse')?.touched">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            <button type="button" (click)="showPassword=!showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path *ngIf="!showPassword" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path *ngIf="!showPassword" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                <path *ngIf="showPassword" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <p *ngIf="form.get('motDePasse')?.invalid && form.get('motDePasse')?.touched" class="text-red-400 text-xs mt-1">Minimum 6 caractères</p>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary w-full flex items-center justify-center gap-2"
          [disabled]="loading$ | async">
          <svg *ngIf="loading$ | async" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          <span>{{ (loading$ | async) ? 'Connexion...' : 'Se Connecter' }}</span>
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-500 text-sm">
          Pas encore de compte?
          <a routerLink="/auth/register" class="text-primary-400 hover:text-primary-300 font-medium ml-1">S'inscrire</a>
        </p>
      </div>
    </div>
  </div>
</div>

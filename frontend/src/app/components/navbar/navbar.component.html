<nav class="bg-dark-800 border-b border-dark-600 sticky top-0 z-50 shadow-lg ">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a [routerLink]="(isAdmin$ | async) ? '/admin/dashboard' : '/'" class="flex items-center gap-3 group">
        <div class="w-9 h-9 bg-primary-600 rounded-lg flex items-center justify-center group-hover:bg-primary-500 transition-colors">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <span class="text-white font-bold text-lg tracking-tight">MOTO<span class="text-primary-500">DIAG</span></span>
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-1">
        <ng-container *ngIf="!(isAdmin$ | async)">
          <a routerLink="/" routerLinkActive="nav-link-active" [routerLinkActiveOptions]="{exact:true}" class="nav-link">Accueil</a>
          <a routerLink="/services" routerLinkActive="nav-link-active" class="nav-link">Services</a>
          <ng-container *ngIf="isAuthenticated$ | async">
            <a routerLink="/dashboard" routerLinkActive="nav-link-active" class="nav-link">Dashboard</a>
            <a routerLink="/vehicles" routerLinkActive="nav-link-active" class="nav-link">Véhicules</a>
            <a routerLink="/appointments" routerLinkActive="nav-link-active" class="nav-link">Rendez-vous</a>
          </ng-container>
        </ng-container>
        <ng-container *ngIf="isAdmin$ | async">
          <a routerLink="/admin/dashboard" routerLinkActive="nav-link-active" class="nav-link text-primary-400">Dashboard Admin</a>
        </ng-container>
      </div>

      <!-- Right Actions -->
      <div class="hidden md:flex items-center gap-3">
        <ng-container *ngIf="isAuthenticated$ | async; else guestButtons">
          <div class="relative">
            <button (click)="toggleUserMenu()" class="flex items-center gap-2 bg-dark-600 hover:bg-dark-500 px-3 py-2 rounded-lg transition-colors">
              <div class="w-7 h-7 bg-primary-700 rounded-full flex items-center justify-center">
                <span class="text-white text-xs font-bold">{{ (currentUser$ | async)?.nom?.[0] | uppercase }}</span>
              </div>
              <span class="text-sm text-gray-200">{{ (currentUser$ | async)?.prenom }}</span>
              <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            <div *ngIf="userMenuOpen" class="absolute right-0 mt-2 w-48 bg-dark-700 border border-dark-500 rounded-xl shadow-2xl overflow-hidden">
              <a routerLink="/profile" (click)="userMenuOpen=false" class="flex items-center gap-2 px-4 py-3 text-sm text-gray-200 hover:bg-dark-600 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Mon Profil
              </a>
              <button (click)="logout(); userMenuOpen=false" class="w-full flex items-center gap-2 px-4 py-3 text-sm text-red-400 hover:bg-dark-600 transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Déconnexion
              </button>
            </div>
          </div>
        </ng-container>
        <ng-template #guestButtons>
          <a routerLink="/auth/login" class="nav-link">Connexion</a>
          <a routerLink="/auth/register" class="btn-primary text-sm py-2 px-4">S'inscrire</a>
        </ng-template>
      </div>

      <!-- Mobile menu button -->
      <button (click)="toggleMobile()" class="md:hidden p-2 rounded-lg text-gray-400 hover:text-white hover:bg-dark-600">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path *ngIf="!mobileOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          <path *ngIf="mobileOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Mobile menu -->
    <div *ngIf="mobileOpen" class="md:hidden pb-4 border-t border-dark-600 mt-2 pt-3">
      <div class="flex flex-col gap-1">
        <ng-container *ngIf="!(isAdmin$ | async)">
          <a routerLink="/" (click)="mobileOpen=false" class="nav-link block">Accueil</a>
          <a routerLink="/services" (click)="mobileOpen=false" class="nav-link block">Services</a>
          <ng-container *ngIf="isAuthenticated$ | async">
            <a routerLink="/dashboard" (click)="mobileOpen=false" class="nav-link block">Dashboard</a>
            <a routerLink="/vehicles" (click)="mobileOpen=false" class="nav-link block">Véhicules</a>
            <a routerLink="/appointments" (click)="mobileOpen=false" class="nav-link block">Rendez-vous</a>
          </ng-container>
        </ng-container>
        <ng-container *ngIf="isAdmin$ | async">
          <a routerLink="/admin/dashboard" (click)="mobileOpen=false" class="nav-link block text-primary-400">Admin Panel</a>
        </ng-container>
        <ng-container *ngIf="isAuthenticated$ | async">
          <button (click)="logout(); mobileOpen=false" class="text-left nav-link block text-red-400 w-full">Déconnexion</button>
        </ng-container>
        <ng-container *ngIf="!(isAuthenticated$ | async)">
          <a routerLink="/auth/login" (click)="mobileOpen=false" class="nav-link block">Connexion</a>
          <a routerLink="/auth/register" (click)="mobileOpen=false" class="btn-primary block text-center mt-2">S'inscrire</a>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
